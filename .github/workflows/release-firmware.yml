name: Release Firmware

# Tag-triggered release. Builds the firmware from a clean toolchain (no cache)
# so the published binary cannot be derived from a poisoned actions/cache entry,
# then attaches it to a GitHub Release.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          pio run -e lolin_s3_mini_1_69
          mv .pio/build/lolin_s3_mini_1_69/firmware.bin .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin
          generate_release_notes: true
