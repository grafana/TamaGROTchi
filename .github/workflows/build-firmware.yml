name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "platformio.ini"
      - "partitions_16M.csv"
      - ".github/workflows/build-firmware.yml"
    tags: ["v*"]
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "platformio.ini"
      - "partitions_16M.csv"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Skip cache on tag-triggered runs so release binaries are always built
      # from a fresh toolchain (mitigates zizmor/cache-poisoning).
      - name: Cache PlatformIO
        if: github.ref_type != 'tag'
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          pio run -e lolin_s3_mini_1_69
          mv .pio/build/lolin_s3_mini_1_69/firmware.bin .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin
          generate_release_notes: true
