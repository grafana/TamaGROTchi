name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "platformio.ini"
      - "partitions_16M.csv"
      - ".github/workflows/build-firmware.yml"
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "platformio.ini"
      - "partitions_16M.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Cache PlatformIO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          pio run -e lolin_s3_mini_1_69
          mv .pio/build/lolin_s3_mini_1_69/firmware.bin .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firmware
          path: .pio/build/lolin_s3_mini_1_69/tamagrotchi.bin
          retention-days: 30
