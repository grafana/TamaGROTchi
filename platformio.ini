; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
; uncomment only one
 default_envs = lolin_s3_mini_1_69 ; Waveshare ESP32-S3-Touch-LCD-1.69

[env]
lib_deps =
	lvgl/lvgl@9.3.0
build_flags =
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_CONF_PATH="\"${PROJECT_DIR}/include/lv_conf.h\""

[esp32]
platform = espressif32@6.9.0
framework = arduino
extra_scripts =
	${env.extra_scripts}
	pre:exclude_helium.py

lib_deps =
	${env.lib_deps}
	lovyan03/LovyanGFX@1.1.16
	bblanchon/ArduinoJson@7.1.0
build_flags =
	${env.build_flags}
build_src_filter =
	+<*>

[env:lolin_s3_mini_1_69]
extends = esp32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16M.csv
board_build.filesystem = littlefs
upload_protocol = esp-builtin
upload_speed = 460800
debug_tool = esp-builtin
debug_speed = 5000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
	${esp32.lib_deps}
	FastIMU=https://github.com/LiquidCGS/FastIMU/archive/refs/tags/1.2.6.zip
build_flags =
	${esp32.build_flags}
	-D ESPS3_1_69=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = ${esp32.build_src_filter}
